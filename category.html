<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفئة — OffensiveAgentic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero hero--sub">
  <div class="wrap">
    <div class="brand-row">
      <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> <span data-i18n="category.back">كل الفئات</span></a>
      <button id="lang-toggle" class="lang-toggle" aria-label="تبديل اللغة">English</button>
    </div>
    <h1 id="cat-title"></h1>
    <p class="lede" id="cat-desc"></p>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <label class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" data-i18n-placeholder="category.search.placeholder" placeholder="ابحث في هذه الفئة…" autocomplete="off">
    </label>
    <div class="filter-row">
      <span class="filter-label" data-i18n="category.filter.byTopic">حسب الموضوع</span>
      <div class="chips" id="topic-chips"></div>
    </div>
  </div>
</div>

<main class="wrap">
  <p class="count-line" id="count-line"></p>
  <div id="grid"></div>
  <div class="empty" id="empty" style="display:none" data-i18n="category.empty">لا يوجد شيء هنا بعد. هذا القسم ينمو — أضف إدخالاً في <code>data.js</code>.</div>
</main>

<footer>
  <div class="wrap">
    <a href="index.html" data-i18n="category.footer.back">← العودة إلى كل الفئات</a> · <span data-i18n="category.footer.contributions">المساهمات مرحب بها على</span>
    <a href="https://github.com/apowfour/Offensive-Security-of-Agentic-AI" target="_blank" rel="noopener">GitHub</a>.
  </div>
</footer>

<script src="i18n.js"></script>
<script src="config.js"></script>
<script src="i18n-topics.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
  i18n.applyToDocument();
  renderCategory();
  document.getElementById('lang-toggle').addEventListener('click', () => i18n.toggle());
  i18n.onChange(() => {
    renderCategory();
  });
</script>
</body>
</html>
